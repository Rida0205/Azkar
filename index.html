<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة القيادة - econcours.ma</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }

        /* Login Page */
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0b1120 0%, #1a2634 100%);
            padding: 1rem;
        }

        .login-box {
            background: white;
            border-radius: 30px;
            padding: 2.5rem 1.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box .logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: #0f172a;
        }

        .login-box .logo span {
            color: #d97706;
        }

        .login-box .hadith {
            color: #d97706;
            font-size: 0.95rem;
            margin: 1rem 0 1.5rem;
            padding: 1rem;
            background: #fef3c7;
            border-radius: 15px;
        }

        .login-box input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 4px;
        }

        .login-box button {
            width: 100%;
            padding: 1rem;
            background: #d97706;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .error-message {
            color: #ef4444;
            margin-top: 1rem;
            display: none;
        }

        /* Dashboard */
        .dashboard-container {
            display: none;
            height: 100vh;
            overflow: hidden;
        }

        .dashboard-container.active {
            display: block;
        }

        /* Header */
        .main-header {
            background: white;
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .header-logo .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
        }

        .header-logo .logo span {
            color: #d97706;
        }

        .admin-welcome {
            background: #fef3c7;
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            color: #d97706;
            font-weight: 600;
            display: inline-block;
            margin-right: 1rem;
            font-size: 0.85rem;
        }

        .date-display {
            background: #f1f5f9;
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            color: #475569;
            display: inline-block;
            font-size: 0.8rem;
            margin-left: 1rem;
        }

        .logout-btn {
            background: none;
            border: 1px solid #e2e8f0;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            color: #64748b;
            cursor: pointer;
        }

        /* Main Content */
        .main-content {
            margin-top: 70px;
            height: calc(100vh - 70px);
            overflow-y: auto;
            padding: 1rem;
        }

        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .kpi-card {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-radius: 16px;
            padding: 1rem;
            color: white;
        }

        .kpi-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .kpi-icon {
            width: 40px;
            height: 40px;
            background: rgba(217, 119, 6, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d97706;
            font-size: 1.2rem;
        }

        .kpi-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 1rem;
            border: 1px solid #e2e8f0;
        }

        .stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            color: #64748b;
            font-size: 0.8rem;
        }

        .stat-number {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
        }

        /* Filter Section */
        .filter-section {
            background: white;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0.8rem;
        }

        .filter-item select, .filter-item input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
        }

        .filter-actions {
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
        }

        .filter-actions button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .apply-filter {
            background: #d97706;
            color: white;
        }

        /* Table */
        .table-container {
            background: white;
            border-radius: 16px;
            padding: 1rem;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
            font-size: 0.85rem;
        }

        th {
            text-align: right;
            padding: 0.8rem 0.5rem;
            color: #64748b;
            font-weight: 600;
            font-size: 0.75rem;
            border-bottom: 2px solid #e2e8f0;
            background: #f8fafc;
        }

        td {
            padding: 0.7rem 0.5rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .service-badge {
            background: #fef3c7;
            color: #d97706;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            display: inline-block;
        }

        .details-btn {
            background: none;
            border: 1px solid #e2e8f0;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            color: #64748b;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 1.5rem;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #64748b;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .info-item {
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 0.4rem;
        }

        .info-label {
            color: #64748b;
            font-size: 0.7rem;
        }

        .info-value {
            color: #0f172a;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .kpi-grid, .stats-grid {
                grid-template-columns: 1fr;
            }
            .filter-grid {
                grid-template-columns: 1fr;
            }
            .filter-actions {
                flex-direction: column;
            }
            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div class="login-container" id="loginPage">
        <div class="login-box">
            <div class="logo">e<span>concours</span>.ma</div>
            <div class="hadith">"الله في عون العبد ما دام العبد في عون أخيه"</div>
            <h2>لوحة التحكم</h2>
            <input type="password" id="passwordInput" placeholder="أدخل الرمز" maxlength="4">
            <button onclick="checkPassword()">دخول</button>
            <div class="error-message" id="errorMessage">رمز الدخول غير صحيح</div>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard-container" id="dashboard">
        <div class="main-header">
            <div>
                <span class="logo">e<span>concours</span>.ma</span>
                <span class="admin-welcome" id="adminWelcome"></span>
            </div>
            <div>
                <span class="date-display" id="currentDate"></span>
                <button class="logout-btn" onclick="logout()">خروج</button>
            </div>
        </div>

        <div class="main-content">
            <div class="kpi-grid" id="kpiGrid"></div>
            <div class="stats-grid" id="statsGrid"></div>

            <!-- Filter -->
            <div class="filter-section">
                <div class="filter-grid">
                    <div class="filter-item">
                        <select id="filterService">
                            <option value="all">الكل</option>
                            <option value="تسجيل فوري">تسجيل فوري</option>
                            <option value="اشتراك 6 أشهر">6 أشهر</option>
                            <option value="اشتراك 12 شهر">12 شهر</option>
                            <option value="تسجيل مجاني">مجاني</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <select id="filterCity"><option value="all">كل المدن</option></select>
                    </div>
                    <div class="filter-item">
                        <input type="text" id="filterName" placeholder="بحث بالاسم">
                    </div>
                    <div class="filter-actions">
                        <button class="apply-filter" onclick="applyFilters()">تطبيق</button>
                        <button onclick="resetFilters()">إعادة</button>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="table-container">
                <div class="table-wrapper">
                    <table id="registrationsTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>الاسم بالعربية</th>
                                <th>الاسم بالفرنسية</th>
                                <th>تاريخ الميلاد</th>
                                <th>المدينة</th>
                                <th>الخدمة</th>
                                <th>تاريخ التسجيل</th>
                                <th>الواتساب</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✖</button>
            <div class="modal-header">
                <h2 id="modalName"></h2>
                <p id="modalNameFr"></p>
            </div>
            <div class="info-grid" id="modalContent"></div>
        </div>
    </div>

    <script>
        // المديرين
        const admins = {"1280": "رضا السايح", "1997": "أيمن ممدوح"};
        let currentAdmin = "";
        let registrations = [];
        let currentData = [];

        // تحميل البيانات من JSON
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                registrations = data;
                currentData = [...registrations];
            })
            .catch(error => console.error('خطأ في تحميل البيانات:', error));

        // حساب العمر
        function calculateAge(birthDate) {
            const today = new Date();
            const birth = new Date(birthDate);
            let age = today.getFullYear() - birth.getFullYear();
            const monthDiff = today.getMonth() - birth.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) age--;
            return age;
        }

        // عرض المؤشرات
        function displayKPIs() {
            if (!registrations.length) return;
            const total = registrations.length;
            const thisMonth = registrations.filter(r => new Date(r.regDate).getMonth() === new Date().getMonth()).length;
            const cities = [...new Set(registrations.map(r => r.city))].length;
            const paid = registrations.filter(r => r.service !== "تسجيل مجاني").length;

            document.getElementById('kpiGrid').innerHTML = `
                <div class="kpi-card">
                    <div class="kpi-header"><div class="kpi-icon"><i class="fas fa-users"></i></div><div class="kpi-value">${total}</div></div>
                    <div>إجمالي المسجلين</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-header"><div class="kpi-icon"><i class="fas fa-calendar"></i></div><div class="kpi-value">${thisMonth}</div></div>
                    <div>هذا الشهر</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-header"><div class="kpi-icon"><i class="fas fa-city"></i></div><div class="kpi-value">${cities}</div></div>
                    <div>مدينة</div>
                </div>
            `;
        }

        function displayStats() {
            if (!registrations.length) return;
            const ages = registrations.map(r => calculateAge(r.birthDate));
            const avgAge = (ages.reduce((a, b) => a + b, 0) / ages.length).toFixed(1);
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-header">معدل الأعمار</div><div class="stat-number">${avgAge}</div></div>
                <div class="stat-card"><div class="stat-header">أصغر مسجل</div><div class="stat-number">${Math.min(...ages)}</div></div>
                <div class="stat-card"><div class="stat-header">أكبر مسجل</div><div class="stat-number">${Math.max(...ages)}</div></div>
                <div class="stat-card"><div class="stat-header">مدن</div><div class="stat-number">${[...new Set(registrations.map(r => r.city))].length}</div></div>
            `;
        }

        // تهيئة خيارات المدن
        function initCityFilter() {
            const cities = [...new Set(registrations.map(r => r.city))].sort();
            const select = document.getElementById('filterCity');
            cities.forEach(city => select.innerHTML += `<option value="${city}">${city}</option>`);
        }

        // عرض الجدول
        function displayTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map((r, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td>${r.nameAr}</td>
                    <td>${r.nameFr}</td>
                    <td>${r.birthDate}</td>
                    <td>${r.city}</td>
                    <td><span class="service-badge">${r.service}</span></td>
                    <td>${r.regDate}</td>
                    <td>${r.whatsapp}</td>
                    <td><button class="details-btn" onclick='showDetails(${JSON.stringify(r).replace(/'/g, "\\'")})'>عرض</button></td>
                </tr>
            `).join('');
        }

        // الفلترة
        function applyFilters() {
            const service = document.getElementById('filterService').value;
            const city = document.getElementById('filterCity').value;
            const name = document.getElementById('filterName').value.toLowerCase();

            currentData = registrations.filter(r => 
                (service === 'all' || r.service === service) &&
                (city === 'all' || r.city === city) &&
                (name === '' || r.nameAr.includes(name) || r.nameFr.toLowerCase().includes(name))
            );
            displayTable(currentData);
        }

        function resetFilters() {
            document.getElementById('filterService').value = 'all';
            document.getElementById('filterCity').value = 'all';
            document.getElementById('filterName').value = '';
            currentData = [...registrations];
            displayTable(currentData);
        }

        // التفاصيل
        function showDetails(p) {
            document.getElementById('modalName').textContent = p.nameAr;
            document.getElementById('modalNameFr').textContent = p.nameFr;
            document.getElementById('modalContent').innerHTML = `
                <div class="info-item"><div class="info-label">رقم البطاقة</div><div class="info-value">${p.cin}</div></div>
                <div class="info-item"><div class="info-label">مكان الإزدياد</div><div class="info-value">${p.birthPlace}</div></div>
                <div class="info-item"><div class="info-label">العنوان</div><div class="info-value">${p.address}</div></div>
                <div class="info-item"><div class="info-label">البريد</div><div class="info-value">${p.email}</div></div>
                <div class="info-item"><div class="info-label">الشهادة</div><div class="info-value">${p.degrees}</div></div>
                <div class="info-item"><div class="info-label">المدرسة</div><div class="info-value">${p.school}</div></div>
                <div class="info-item"><div class="info-label">العمر</div><div class="info-value">${calculateAge(p.birthDate)}</div></div>
            `;
            document.getElementById('detailsModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailsModal').classList.remove('active');
        }

        // الدخول
        function checkPassword() {
            const code = document.getElementById('passwordInput').value;
            if (admins[code]) {
                currentAdmin = admins[code];
                document.getElementById('adminWelcome').textContent = currentAdmin;
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').classList.add('active');
                
                // انتظر تحميل البيانات
                setTimeout(() => {
                    displayKPIs();
                    displayStats();
                    initCityFilter();
                    displayTable(registrations);
                }, 500);
            } else {
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        function logout() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
        }

        // تحديث التاريخ
        setInterval(() => {
            const today = new Date();
            document.getElementById('currentDate').textContent = today.toLocaleDateString('ar-MA');
        }, 1000);
    </script>
</body>
</html>
