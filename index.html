    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }

        /* Login Page */
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0b1120 0%, #1a2634 100%);
            padding: 1rem;
        }

        .login-box {
            background: white;
            border-radius: 30px;
            padding: 2rem 1.5rem;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .login-box .logo {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0f172a;
        }

        .login-box .logo span {
            color: #d97706;
        }

        .login-box .hadith {
            color: #d97706;
            font-size: 0.9rem;
            margin: 1rem 0;
            padding: 0.8rem;
            background: #fef3c7;
            border-radius: 15px;
        }

        .login-box h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #334155;
        }

        .login-box input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 4px;
        }

        .login-box button {
            width: 100%;
            padding: 0.8rem;
            background: #d97706;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .error-message {
            color: #ef4444;
            margin-top: 1rem;
            display: none;
        }

        /* Dashboard */
        .dashboard-container {
            display: none;
            height: 100vh;
            overflow: hidden;
        }

        .dashboard-container.active {
            display: block;
        }

        /* Header */
        .main-header {
            background: white;
            padding: 0.8rem 1.5rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
        }

        .logo span {
            color: #d97706;
        }

        .admin-badge {
            background: #fef3c7;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            color: #d97706;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .date-badge {
            background: #f1f5f9;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            color: #475569;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logout-btn {
            background: none;
            border: 1px solid #e2e8f0;
            padding: 0.4rem 1rem;
            border-radius: 8px;
            color: #64748b;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* Main Content */
        .main-content {
            margin-top: 70px;
            height: calc(100vh - 70px);
            overflow-y: auto;
            padding: 1.5rem;
            -webkit-overflow-scrolling: touch;
        }

        /* ========== تصميم موحد للهاتف والحاسوب ========== */
        
        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .kpi-card {
            background: white;
            border-radius: 16px;
            padding: 1.2rem;
            border: 1px solid #e2e8f0;
        }

        .kpi-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.8rem;
        }

        .kpi-icon {
            width: 40px;
            height: 40px;
            background: #fef3c7;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d97706;
            font-size: 1.2rem;
        }

        .kpi-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f172a;
        }

        .kpi-label {
            color: #64748b;
            font-size: 0.85rem;
        }

        /* Alerts Grid */
        .alerts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .alert-card {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-radius: 16px;
            padding: 1.2rem;
            color: white;
        }

        .alert-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .alert-header i {
            color: #d97706;
            font-size: 1.2rem;
        }

        .alert-header span {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .alert-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
        }

        .alert-list {
            font-size: 0.8rem;
            color: #cbd5e1;
            max-height: 80px;
            overflow-y: auto;
        }

        .alert-list div {
            padding: 0.2rem 0;
            border-bottom: 1px solid #334155;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: white;
            border-radius: 14px;
            padding: 1rem;
            border: 1px solid #e2e8f0;
        }

        .stat-title {
            color: #64748b;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin-bottom: 0.4rem;
        }

        .stat-title i {
            color: #d97706;
        }

        .stat-main {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
        }

        .stat-name {
            font-size: 0.8rem;
            color: #64748b;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Birthday Alert */
        .birthday-alert {
            background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
            border-radius: 16px;
            padding: 1rem 1.2rem;
            margin-bottom: 1.5rem;
            color: white;
        }

        .birthday-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .birthday-header i {
            font-size: 1.2rem;
        }

        .birthday-header span {
            font-size: 1rem;
            font-weight: 600;
        }

        .birthday-list {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .birthday-item {
            background: rgba(255,255,255,0.2);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Filter Section */
        .filter-section {
            background: white;
            border-radius: 16px;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e2e8f0;
        }

        .filter-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-size: 1rem;
            font-weight: 600;
            color: #0f172a;
        }

        .filter-title i {
            color: #d97706;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }

        .filter-item select, .filter-item input {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
        }

        .filter-actions {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }

        .filter-actions button {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-primary {
            background: #d97706;
            color: white;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #64748b;
        }

        /* Table */
        .table-container {
            background: white;
            border-radius: 16px;
            padding: 1.2rem;
            border: 1px solid #e2e8f0;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .table-header h3 {
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #0f172a;
        }

        .table-header h3 i {
            color: #d97706;
        }

        .results-count {
            color: #64748b;
            font-size: 0.9rem;
        }

        .table-wrapper {
            overflow-x: auto;
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid #f1f5f9;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
            font-size: 0.9rem;
        }

        th {
            text-align: right;
            padding: 0.8rem;
            color: #64748b;
            font-weight: 600;
            font-size: 0.8rem;
            border-bottom: 2px solid #e2e8f0;
            background: #f8fafc;
            position: sticky;
            top: 0;
        }

        td {
            padding: 0.8rem;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }

        .badge {
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        .badge-success {
            background: #d1fae5;
            color: #10b981;
        }

        .badge-warning {
            background: #fef3c7;
            color: #d97706;
        }

        .badge-info {
            background: #dbeafe;
            color: #3b82f6;
        }

        .btn-details {
            background: none;
            border: 1px solid #e2e8f0;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            color: #64748b;
            cursor: pointer;
            font-size: 0.75rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 1.5rem;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #64748b;
        }

        .modal-header {
            text-align: center;
            margin-bottom: 1.2rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .modal-header h2 {
            font-size: 1.3rem;
            color: #0f172a;
        }

        .modal-header p {
            font-size: 0.9rem;
            color: #64748b;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .info-item {
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 0.4rem;
        }

        .info-label {
            color: #64748b;
            font-size: 0.75rem;
            margin-bottom: 0.2rem;
        }

        .info-value {
            color: #0f172a;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* ========== تحسينات الهاتف فقط ========== */
        @media (max-width: 768px) {
            .main-header {
                padding: 0.5rem 1rem;
                height: 60px;
            }

            .header-logo {
                gap: 0.5rem;
            }

            .logo {
                font-size: 1.2rem;
            }

            .admin-badge {
                padding: 0.2rem 0.6rem;
                font-size: 0.75rem;
            }

            .admin-badge span {
                display: none;
            }

            .header-info {
                gap: 0.5rem;
            }

            .date-badge {
                padding: 0.2rem 0.6rem;
                font-size: 0.7rem;
            }

            .date-badge span {
                display: none;
            }

            .logout-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.7rem;
            }

            .logout-btn span {
                display: none;
            }

            .main-content {
                margin-top: 60px;
                padding: 0.8rem;
            }

            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.5rem;
            }

            .kpi-card {
                padding: 0.8rem;
            }

            .kpi-icon {
                width: 32px;
                height: 32px;
                font-size: 1rem;
            }

            .kpi-value {
                font-size: 1.3rem;
            }

            .kpi-label {
                font-size: 0.7rem;
            }

            .alerts-grid {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }

            .alert-card {
                padding: 0.8rem;
            }

            .alert-header i {
                font-size: 1rem;
            }

            .alert-header span {
                font-size: 0.8rem;
            }

            .alert-value {
                font-size: 1.5rem;
            }

            .alert-list {
                font-size: 0.7rem;
                max-height: 60px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.5rem;
            }

            .stat-card {
                padding: 0.7rem;
            }

            .stat-title {
                font-size: 0.7rem;
            }

            .stat-number {
                font-size: 1.1rem;
            }

            .stat-name {
                font-size: 0.65rem;
                max-width: 80px;
            }

            .birthday-alert {
                padding: 0.8rem;
            }

            .birthday-header i {
                font-size: 1rem;
            }

            .birthday-header span {
                font-size: 0.85rem;
            }

            .birthday-item {
                padding: 0.3rem 0.8rem;
                font-size: 0.7rem;
            }

            .filter-section {
                padding: 0.8rem;
            }

            .filter-title {
                font-size: 0.9rem;
            }

            .filter-grid {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }

            .filter-item select, .filter-item input {
                padding: 0.5rem;
                font-size: 0.8rem;
            }

            .filter-actions {
                flex-direction: column;
                gap: 0.5rem;
            }

            .filter-actions button {

<body>
    <!-- Login Page -->
    <div class="login-container" id="loginPage">

    <!-- Dashboard -->
    <div class="dashboard-container" id="dashboard">
        <div class="main-header">

        <div class="main-content">
            <!-- KPI Cards -->

            <!-- Expiry Alerts -->

            <!-- Birthday Alert -->
            <div class="birthday-alert" id="birthdayAlert">

            <!-- Filter Section -->
            <div class="filter-section">
                <div class="filter-title">

                    <span>فلترة البيانات</span>
                </div>
                <div class="filter-grid">
                    <div class="filter-item">
                        <select id="filterService">
                            <option value="all">جميع الخدمات</option>
                            <option value="تسجيل فوري">تسجيل فوري</option>
                            <option value="اشتراك 6 أشهر">اشتراك 6 أشهر</option>
                            <option value="اشتراك 12 شهر">اشتراك 12 شهر</option>
                            <option value="تسجيل مجاني">تسجيل مجاني</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <select id="filterCity">
                            <option value="all">جميع المدن</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <select id="filterDegree">
                            <option value="all">جميع الشهادات</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <input type="text" id="filterName" placeholder="بحث بالاسم...">
                    </div>
                    <div class="filter-actions">
                        <button class="btn-primary" onclick="applyFilters()">تطبيق</button>
                        <button class="btn-secondary" onclick="resetFilters()">إعادة</button>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="table-container">
                <div class="table-header">
                    <h3><i class="fas fa-users"></i> قائمة المسجلين</h3>
                    <span class="results-count" id="resultsCount"></span>
                </div>
                <div class="table-wrapper">
                    <table id="registrationsTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>الاسم</th>
                                <th>الفرنسية</th>
                                <th>الميلاد</th>
                                <th>المدينة</th>
                                <th>الخدمة</th>
                                <th>التسجيل</th>
                                <th>واتساب</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>

            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="detailsModal">
        <div class="modal-content">

            <div class="modal-header">
                <h2 id="modalName"></h2>
                <p id="modalNameFr"></p>
            </div>
            <div class="info-grid" id="modalContent"></div>
        </div>
    </div>

    <script>
        // منع أدوات المطور
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
        });

        // البيانات
        const registrations = [
            {
                id: 1,
                nameAr: "أحمد بن محمد",
                nameFr: "Ahmed Ben Mohamed",
                birthDate: "1995-03-20",

            {

                service: "اشتراك 6 أشهر",
                regDate: "2026-01-15",
                city: "الرباط"
            },
            {
                id: 3,
                nameAr: "يوسف العلوي",
                nameFr: "Youssef Alaoui",
                birthDate: "1997-11-25",
                birthPlace: "فاس",
                address: "شارع الحسن الثاني، فاس",
                cin: "QA345678",
                whatsapp: "0634567890",
                email: "youssef@gmail.com",
                degrees: "باكالوريا علوم تجريبية, إجازة في العلوم الاقتصادية",
                school: "جامعة سيدي محمد بن عبدالله",
                service: "تسجيل فوري",
                regDate: "2026-03-03",
                city: "فاس"
            },
            {
                id: 4,
                nameAr: "كريمة السعدي",
                nameFr: "Karima Saadi",
                birthDate: "1996-12-10",
                birthPlace: "مراكش",
                address: "حي جليز، مراكش",
                cin: "AB901234",
                whatsapp: "0645678901",
                email: "karima@gmail.com",
                degrees: "باكالوريا علوم فيزيائية, إجازة في الهندسة المدنية, ماستر هندسة مدنية",
                school: "المدرسة المحمدية للمهندسين",
                service: "تسجيل مجاني",
                regDate: "2026-02-20",
                city: "مراكش"
            },
            {
                id: 5,
                nameAr: "محمد أمين",
                nameFr: "Mohamed Amine",
                birthDate: "1999-01-05",
                birthPlace: "طنجة",
                address: "حي بني مكادة، طنجة",
                cin: "CD567890",
                whatsapp: "0656789012",
                email: "mohamed@gmail.com",
                degrees: "باكالوريا علوم حياتية, إجازة في الطب",
                school: "كلية الطب بطنجة",
                service: "اشتراك 12 شهر",
                regDate: "2026-02-01",
                city: "طنجة"
            }
        ];

        let currentData = [...registrations];

        // المديرين
        const admins = { "1280": "رضا السايح", "1997": "أيمن ممدوح" };
        let currentAdmin = "";

        // حساب العمر
        function calculateAge(birthDate) {
            const today = new Date();
            const birth = new Date(birthDate);
            let age = today.getFullYear() - birth.getFullYear();
            const monthDiff = today.getMonth() - birth.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) age--;
            return age;
        }

        // حساب الأيام حتى عيد الميلاد
        function daysUntilBirthday(birthDate) {
            const today = new Date();
            const birth = new Date(birthDate);
            const nextBirthday = new Date(today.getFullYear(), birth.getMonth(), birth.getDate());
            if (today > nextBirthday) nextBirthday.setFullYear(today.getFullYear() + 1);
            return Math.ceil((nextBirthday - today) / (1000 * 60 * 60 * 24));
        }

        // حساب الأيام المتبقية في الاشتراك
        function daysUntilExpiry(regDate, months) {
            const reg = new Date(regDate);
            const expiry = new Date(reg);
            expiry.setMonth(expiry.getMonth() + months);
            const today = new Date();
            const diff = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));
            return diff > 0 ? diff : 0;
        }

        // عرض مؤشرات KPI
        function displayKPIs() {
            const total = registrations.length;
            const thisMonth = registrations.filter(r => new Date(r.regDate).getMonth() === new Date().getMonth()).length;
            const free = registrations.filter(r => r.service === "تسجيل مجاني").length;
            const cities = [...new Set(registrations.map(r => r.city))].length;

            document.getElementById('kpiGrid').innerHTML = `
                <div class="kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-icon"><i class="fas fa-users"></i></div>
                        <div class="kpi-value">${total}</div>
                    </div>
                    <div class="kpi-label">إجمالي المسجلين</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-icon"><i class="fas fa-calendar-check"></i></div>
                        <div class="kpi-value">${thisMonth}</div>
                    </div>
                    <div class="kpi-label">هذا الشهر</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-icon"><i class="fas fa-hand-holding-heart"></i></div>
                        <div class="kpi-value">${free}</div>
                    </div>
                    <div class="kpi-label">تسجيل مجاني</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-icon"><i class="fas fa-city"></i></div>
                        <div class="kpi-value">${cities}</div>
                    </div>
                    <div class="kpi-label">مدن مختلفة</div>
                </div>
            `;
        }

        // عرض مؤشرات انتهاء الاشتراكات
        function displayExpiryAlerts() {
            const sixMonths = registrations.filter(r => r.service === "اشتراك 6 أشهر");
            const twelveMonths = registrations.filter(r => r.service === "اشتراك 12 شهر");
            
            const expiringSoon6 = sixMonths
                .map(r => ({ ...r, days: daysUntilExpiry(r.regDate, 6) }))
                .filter(r => r.days <= 30 && r.days > 0)
                .sort((a, b) => a.days - b.days);

            const expiringSoon12 = twelveMonths
                .map(r => ({ ...r, days: daysUntilExpiry(r.regDate, 12) }))
                .filter(r => r.days <= 30 && r.days > 0)
                .sort((a, b) => a.days - b.days);

            document.getElementById('alertsGrid').innerHTML = `
                <div class="alert-card">
                    <div class="alert-header">
                        <i class="fas fa-clock"></i>
                        <span>اشتراك 6 أشهر</span>
                    </div>
                    <div class="alert-value">${expiringSoon6.length}</div>
                    <div class="alert-list">
                        ${expiringSoon6.length > 0 ? 
                            expiringSoon6.map(r => `<div>${r.nameAr} - ${r.days} يوم</div>`).join('') : 
                            '<div>لا توجد اشتراكات قريبة</div>'}
                    </div>
                </div>
                <div class="alert-card">
                    <div class="alert-header">
                        <i class="fas fa-calendar-times"></i>
                        <span>اشتراك 12 شهر</span>
                    </div>
                    <div class="alert-value">${expiringSoon12.length}</div>
                    <div class="alert-list">
                        ${expiringSoon12.length > 0 ? 
                            expiringSoon12.map(r => `<div>${r.nameAr} - ${r.days} يوم</div>`).join('') : 
                            '<div>لا توجد اشتراكات قريبة</div>'}
                    </div>
                </div>
            `;
        }

        // عرض المؤشرات الإضافية
        function displayStats() {
            const ages = registrations.map(r => ({ 
                age: calculateAge(r.birthDate), 
                name: r.nameAr 
            }));
            
            const minAge = Math.min(...ages.map(a => a.age));
            const maxAge = Math.max(...ages.map(a => a.age));
            
            const youngest = ages.find(a => a.age === minAge);
            const oldest = ages.find(a => a.age === maxAge);
            const avgAge = (ages.reduce((a, b) => a + b.age, 0) / ages.length).toFixed(1);

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-title"><i class="fas fa-child"></i> أصغر مسجل</div>
                    <div class="stat-main">
                        <span class="stat-number">${minAge}</span>
                        <span class="stat-name">${youngest.name}</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-title"><i class="fas fa-user-tie"></i> أكبر مسجل</div>
                    <div class="stat-main">
                        <span class="stat-number">${maxAge}</span>
                        <span class="stat-name">${oldest.name}</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-title"><i class="fas fa-calendar-alt"></i> معدل الأعمار</div>
                    <div class="stat-main">
                        <span class="stat-number">${avgAge}</span>
                        <span class="stat-name">سنة</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-title"><i class="fas fa-graduation-cap"></i> إجمالي الشهادات</div>
                    <div class="stat-main">
                        <span class="stat-number">${registrations.reduce((sum, r) => sum + (r.degrees ? r.degrees.split(',').length : 1), 0)}</span>
                        <span class="stat-name">شهادة</span>
                    </div>
                </div>
            `;
        }

        // عرض أعياد الميلاد
        function displayBirthdays() {
            const upcoming = registrations
                .map(r => ({...r, days: daysUntilBirthday(r.birthDate)}))
                .filter(r => r.days <= 30)
                .sort((a, b) => a.days - b.days)
                .slice(0, 5);

            const list = document.getElementById('birthdayList');
            
            if (upcoming.length === 0) {
                list.innerHTML = '<div class="birthday-item">لا توجد أعياد قريبة</div>';
                return;
            }

            list.innerHTML = upcoming.map(r => `
                <div class="birthday-item">
                    <i class="fas fa-cake-candles"></i>
                    <span>${r.nameAr.split(' ')[0]}</span>
                    <span>${r.days} يوم</span>
                </div>
            `).join('');
        }

        // تهيئة خيارات الفلتر
        function initFilters() {
            const cities = [...new Set(registrations.map(r => r.city))].sort();
            const degrees = [...new Set(registrations.flatMap(r => r.degrees ? r.degrees.split(',').map(d => d.trim()) : []))].sort();
            
            const citySelect = document.getElementById('filterCity');
            const degreeSelect = document.getElementById('filterDegree');
            
            citySelect.innerHTML = '<option value="all">جميع المدن</option>';
            degreeSelect.innerHTML = '<option value="all">جميع الشهادات</option>';
            
            cities.forEach(city => {
                citySelect.innerHTML += `<option value="${city}">${city}</option>`;
            });
            
            degrees.forEach(degree => {
                degreeSelect.innerHTML += `<option value="${degree}">${degree}</option>`;
            });
        }

        // عرض الجدول
        function displayTable(data) {
            const tbody = document.getElementById('tableBody');
            document.getElementById('resultsCount').textContent = `عرض ${data.length} من ${registrations.length}`;
            
            tbody.innerHTML = data.map((r, i) => {
                let badgeClass = 'badge-warning';
                if (r.service === 'تسجيل مجاني') badgeClass = 'badge-success';
                else if (r.service === 'تسجيل فوري') badgeClass = 'badge-info';
                
                return `
                    <tr>
                        <td>${i+1}</td>
                        <td>${r.nameAr}</td>
                        <td>${r.nameFr}</td>
                        <td>${r.birthDate}</td>
                        <td>${r.city}</td>
                        <td><span class="badge ${badgeClass}">${r.service}</span></td>
                        <td>${r.regDate}</td>
                        <td>${r.whatsapp}</td>
                        <td><button class="btn-details" onclick='showDetails(${JSON.stringify(r).replace(/'/g, "\\'")})'><i class="fas fa-eye"></i></button></td>
                    </tr>
                `;
            }).join('');
        }

        // تطبيق الفلاتر
        function applyFilters() {
            const service = document.getElementById('filterService').value;
            const city = document.getElementById('filterCity').value;
            const degree = document.getElementById('filterDegree').value;
            const name = document.getElementById('filterName').value.toLowerCase();

            currentData = registrations.filter(r => {
                if (service !== 'all' && r.service !== service) return false;
                if (city !== 'all' && r.city !== city) return false;
                if (degree !== 'all') {
                    const degrees = r.degrees ? r.degrees.split(',').map(d => d.trim()) : [];
                    if (!degrees.includes(degree)) return false;
                }
                if (name && !r.nameAr.includes(name) && !r.nameFr.toLowerCase().includes(name)) return false;
                return true;
            });

            displayTable(currentData);
        }

        function resetFilters() {
            document.getElementById('filterService').value = 'all';
            document.getElementById('filterCity').value = 'all';
            document.getElementById('filterDegree').value = 'all';
            document.getElementById('filterName').value = '';
            currentData = [...registrations];
            displayTable(currentData);
        }

        // عرض التفاصيل
        function showDetails(p) {
            document.getElementById('modalName').textContent = p.nameAr;
            document.getElementById('modalNameFr').textContent = p.nameFr;
            
            const degrees = p.degrees ? p.degrees.split(',').map(d => d.trim()).join('، ') : 'غير محدد';
            
            document.getElementById('modalContent').innerHTML = `
                <div class="info-item"><div class="info-label">رقم البطاقة</div><div class="info-value">${p.cin}</div></div>
                <div class="info-item"><div class="info-label">مكان الإزدياد</div><div class="info-value">${p.birthPlace}</div></div>
                <div class="info-item"><div class="info-label">العنوان</div><div class="info-value">${p.address}</div></div>
                <div class="info-item"><div class="info-label">البريد</div><div class="info-value">${p.email}</div></div>
                <div class="info-item"><div class="info-label">الشهادات</div><div class="info-value">${degrees}</div></div>
                <div class="info-item"><div class="info-label">المدرسة</div><div class="info-value">${p.school}</div></div>
                <div class="info-item"><div class="info-label">العمر</div><div class="info-value">${calculateAge(p.birthDate)} سنة</div></div>
                <div class="info-item"><div class="info-label">الخدمة</div><div class="info-value">${p.service}</div></div>
            `;
            
            document.getElementById('detailsModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailsModal').classList.remove('active');
        }

        function updateDate() {
            const today = new Date();
            document.getElementById('currentDate').textContent = today.toLocaleDateString('ar-MA', { 
                year: 'numeric', 
                month: 'numeric', 
                day: 'numeric' 
            });
        }

        function checkPassword() {
            const code = document.getElementById('passwordInput').value;
            
            if (admins[code]) {
                currentAdmin = admins[code];
                document.getElementById('adminName').textContent = currentAdmin;
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').classList.add('active');
                
                displayKPIs();
                displayExpiryAlerts();
                displayStats();
                displayBirthdays();
                initFilters();
                displayTable(registrations);
                updateDate();
                
                setInterval(updateDate, 60000);
            } else {
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        function logout() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('passwordInput').value = '';
            document.getElementById('errorMessage').style.display = 'none';
        }

        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
