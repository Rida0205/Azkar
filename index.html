    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* ========== الوضع الليلي ========== */
        body.dark-mode {
            background: #0f172a;
            color: #e2e8f0;
        }

        body.dark-mode .login-box {
            background: #1e293b;
            border: 1px solid #334155;
        }

        body.dark-mode .login-box .logo {
            color: #f1f5f9;
        }

        body.dark-mode .login-box .logo span {
            color: #fbbf24;
        }

        body.dark-mode .login-box .hadith {
            background: #2d3a4f;
            color: #fbbf24;
        }

        body.dark-mode .login-box input {
            background: #0f172a;
            border-color: #334155;
            color: #e2e8f0;
        }

        body.dark-mode .main-header {
            background: #1e293b;
            border-bottom-color: #334155;
        }

        body.dark-mode .logo {
            color: #f1f5f9;
        }

        body.dark-mode .logo span {
            color: #fbbf24;
        }

        body.dark-mode .admin-badge {
            background: #2d3a4f;
            color: #fbbf24;
        }

        body.dark-mode .date-badge {
            background: #2d3a4f;
            color: #94a3b8;
        }

        body.dark-mode .kpi-card,
        body.dark-mode .stat-card,
        body.dark-mode .filter-section,
        body.dark-mode .table-container {
            background: #1e293b;
            border-color: #334155;
        }

        body.dark-mode .kpi-value,
        body.dark-mode .stat-number,
        body.dark-mode .filter-title,
        body.dark-mode .table-header h3 {
            color: #f1f5f9;
        }

        body.dark-mode .kpi-label,
        body.dark-mode .stat-title,
        body.dark-mode .results-count {
            color: #94a3b8;
        }

        body.dark-mode .kpi-icon {
            background: #2d3a4f;
            color: #fbbf24;
        }

        body.dark-mode .filter-item select,
        body.dark-mode .filter-item input {
            background: #0f172a;
            border-color: #334155;
            color: #e2e8f0;
        }

        body.dark-mode .btn-secondary {
            background: #334155;
            color: #e2e8f0;
        }

        body.dark-mode th {
            background: #0f172a;
            color: #94a3b8;
            border-bottom-color: #334155;
        }

        body.dark-mode td {
            color: #cbd5e1;
            border-bottom-color: #334155;
        }

        body.dark-mode .badge-warning {
            background: #854d0e;
            color: #fcd34d;
        }

        body.dark-mode .badge-success {
            background: #065f46;
            color: #6ee7b7;
        }

        body.dark-mode .badge-info {
            background: #1e3a8a;
            color: #93c5fd;
        }

        body.dark-mode .btn-details {
            border-color: #475569;
            color: #94a3b8;
        }

        body.dark-mode .btn-details:hover {
            background: #fbbf24;
            color: #0f172a;
        }

        body.dark-mode .modal-content {
            background: #1e293b;
            border: 1px solid #334155;
        }

        body.dark-mode .modal-header {
            border-bottom-color: #334155;
        }

        body.dark-mode .modal-header h2,
        body.dark-mode .modal-header p {
            color: #f1f5f9;
        }

        body.dark-mode .info-item {
            border-bottom-color: #334155;
        }

        body.dark-mode .info-label {
            color: #94a3b8;
        }

        body.dark-mode .info-value {
            color: #f1f5f9;
        }

        /* ========== أزرار التطبيق السفلية ========== */
        .app-bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0.5rem 1rem;
            border-top: 1px solid #e2e8f0;
            z-index: 1000;
            height: 65px;
        }

        body.dark-mode .app-bottom-bar {
            background: #1e293b;
            border-top-color: #334155;
        }

        .bottom-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.2rem;
            background: none;
            border: none;
            color: #64748b;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .bottom-btn i {
            font-size: 1.3rem;
            color: #d97706;
        }

        .bottom-btn span {
            font-size: 0.65rem;
        }

        body.dark-mode .bottom-btn {
            color: #94a3b8;
        }

        body.dark-mode .bottom-btn i {
            color: #fbbf24;
        }

        .bottom-btn:hover {
            background: #f1f5f9;
        }

        body.dark-mode .bottom-btn:hover {
            background: #334155;
        }

        /* Login Page */
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0b1120 0%, #1a2634 100%);
            padding: 1rem;
        }

        .login-box {
            background: white;
            border-radius: 30px;
            padding: 2rem 1.5rem;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .login-box .logo {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0f172a;
        }

        .login-box .logo span {
            color: #d97706;
        }

        .login-box .hadith {
            color: #d97706;
            font-size: 0.9rem;
            margin: 1rem 0;
            padding: 0.8rem;
            background: #fef3c7;
            border-radius: 15px;
        }

        .login-box h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #334155;
        }

        .login-box input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 4px;
        }

        .login-box button {
            width: 100%;
            padding: 0.8rem;
            background: #d97706;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .error-message {
            color: #ef4444;
            margin-top: 1rem;
            display: none;
        }

        /* Dashboard */
        .dashboard-container {
            display: none;
            height: 100vh;
            overflow: hidden;
        }

        .dashboard-container.active {
            display: block;
        }

        /* ========== Header مختصر ========== */
        .main-header {
            background: white;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0f172a;
            white-space: nowrap;
        }

        .logo span {
            color: #d97706;
        }

        .admin-badge {
            background: #fef3c7;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            color: #d97706;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
        }

        .header-info {
            display: flex;
            align-items: center;
        }

        .date-badge {
            background: #f1f5f9;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            color: #475569;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
        }

        /* Main Content - مع مساحة للأسفل */
        .main-content {
            margin-top: 60px;
            margin-bottom: 65px;
            height: calc(100vh - 60px - 65px);
            overflow-y: auto;
            padding: 1rem;
            -webkit-overflow-scrolling: touch;
        }

        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .kpi-card {
            background: white;
            border-radius: 16px;
            padding: 1.2rem;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
        }

        .kpi-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -5px rgba(217, 119, 6, 0.2);
            border-color: #d97706;
        }

        .kpi-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.8rem;
        }

        .kpi-icon {
            width: 40px;
            height: 40px;
            background: #fef3c7;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d97706;
            font-size: 1.2rem;
        }

        .kpi-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f172a;
        }

        .kpi-label {
            color: #64748b;
            font-size: 0.85rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: white;
            border-radius: 14px;
            padding: 1rem;
            border: 1px solid #e2e8f0;
        }

        .stat-title {
            color: #64748b;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin-bottom: 0.4rem;
        }

        .stat-title i {
            color: #d97706;
        }

        .stat-main {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
        }

        .stat-name {
            font-size: 0.8rem;
            color: #64748b;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Birthday Alert */
        .birthday-alert {
            background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
            border-radius: 16px;
            padding: 1rem 1.2rem;
            margin-bottom: 1.5rem;
            color: white;
        }

        .birthday-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .birthday-header i {
            font-size: 1.3rem;
        }

        .birthday-header span {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .birthday-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .birthday-item {
            background: rgba(255,255,255,0.15);
            padding: 0.6rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .birthday-item i {
            font-size: 1rem;
        }

        .birthday-days {
            background: rgba(255,255,255,0.3);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: auto;
        }

        /* Filter Section */
        .filter-section {
            background: white;
            border-radius: 16px;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e2e8f0;
        }

        .filter-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-size: 1rem;
            font-weight: 600;
            color: #0f172a;
        }

        .filter-title i {
            color: #d97706;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }

        .filter-item select, .filter-item input {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
        }

        .filter-actions {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }

        .filter-actions button {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-primary {
            background: #d97706;
            color: white;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #64748b;
        }

        /* Table */
        .table-container {
            background: white;
            border-radius: 16px;
            padding: 1.2rem;
            border: 1px solid #e2e8f0;
            margin-bottom: 1rem;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .table-header h3 {
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #0f172a;
        }

        .table-header h3 i {
            color: #d97706;
        }

        .results-count {
            color: #64748b;
            font-size: 0.9rem;
        }

        .table-wrapper {
            overflow-x: auto;
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid #f1f5f9;
            border-radius: 10px;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
            font-size: 0.9rem;
        }

        th {
            text-align: right;
            padding: 0.8rem;
            color: #64748b;
            font-weight: 600;
            font-size: 0.8rem;
            border-bottom: 2px solid #e2e8f0;
            background: #f8fafc;
            position: sticky;
            top: 0;
        }

        td {
            padding: 0.8rem;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }

        .badge {
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        .badge-success {
            background: #d1fae5;
            color: #10b981;
        }

        .badge-warning {
            background: #fef3c7;
            color: #d97706;
        }

        .badge-info {
            background: #dbeafe;
            color: #3b82f6;
        }

        .btn-details {
            background: none;
            border: 1px solid #e2e8f0;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            color: #64748b;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .btn-details:hover {
            background: #d97706;
            color: white;
            border-color: #d97706;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            width: 95%;
            max-width: 550px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.8rem;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #64748b;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .modal-close:hover {
            background: #fee2e2;
            color: #ef4444;
        }

        .modal-header {
            text-align: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #f1f5f9;
        }

        .modal-header h2 {
            font-size: 1.4rem;
            color: #0f172a;
            margin-bottom: 0.3rem;
        }

        .modal-header p {
            font-size: 1rem;
            color: #64748b;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.2rem;
        }

        .info-item {
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 0.6rem;
        }

        .info-label {
            color: #64748b;
            font-size: 0.8rem;
            margin-bottom: 0.2rem;
            font-weight: 500;
        }

        .info-value {
            color: #0f172a;
            font-weight: 600;
            font-size: 1rem;
            word-break: break-word;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.5rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.5rem;
            }

            .filter-grid {
                grid-template-columns: 1fr;
            }

            .filter-actions {
                flex-direction: column;
            }

            .filter-actions button {
                width: 100%;
            }

            .modal-content {
                padding: 1.2rem;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .kpi-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .logo {
                font-size: 1.1rem;
            }

            .admin-badge {
                font-size: 0.75rem;
                padding: 0.2rem 0.5rem;
            }

            .date-badge {
                font-size: 0.75rem;
                padding: 0.2rem 0.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div class="login-container" id="loginPage">
        <div class="login-box">
            <div class="logo">e<span>concours</span>.ma</div>
            <div class="hadith">"الله في عون العبد ما دام العبد في عون أخيه"</div>
            <h2>لوحة التحكم</h2>
            <input type="password" id="passwordInput" placeholder="••••" maxlength="4">
            <button onclick="checkPassword()">دخول</button>
            <div class="error-message" id="errorMessage">رمز الدخول غير صحيح</div>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard-container" id="dashboard">
        <!-- Header مختصر -->
        <div class="main-header">
            <div class="header-logo">
                <div class="logo">e<span>concours</span>.ma</div>
                <div class="admin-badge" id="adminBadge">
                    <i class="fas fa-user-circle"></i>
                    <span id="adminName">...</span>
                </div>
            </div>
            <div class="header-info">
                <div class="date-badge" id="dateDisplay">
                    <i class="fas fa-calendar-alt"></i>
                    <span id="currentDate"></span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- KPI Cards -->
            <div class="kpi-grid" id="kpiGrid"></div>

            <!-- Stats Grid -->
            <div class="stats-grid" id="statsGrid"></div>

            <!-- Birthday Alert -->
            <div class="birthday-alert" id="birthdayAlert">
                <div class="birthday-header">
                    <i class="fas fa-cake-candles"></i>
                    <span>أعياد الميلاد القريبة</span>
                </div>
                <div class="birthday-list" id="birthdayList"></div>
            </div>

            <!-- Filter Section -->
            <div class="filter-section">
                <div class="filter-title">
                    <i class="fas fa-filter"></i>
                    <span>فلترة البيانات</span>
                </div>
                <div class="filter-grid">
                    <div class="filter-item">
                        <select id="filterService">
                            <option value="all">جميع الخدمات</option>
                            <option value="تسجيل فوري">تسجيل فوري</option>
                            <option value="اشتراك 6 أشهر">اشتراك 6 أشهر</option>
                            <option value="اشتراك 12 شهر">اشتراك 12 شهر</option>
                            <option value="تسجيل مجاني">تسجيل مجاني</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <select id="filterCity">
                            <option value="all">جميع المدن</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <select id="filterDegree">
                            <option value="all">جميع الشهادات</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <input type="text" id="filterName" placeholder="بحث بالاسم...">
                    </div>
                    <div class="filter-actions">
                        <button class="btn-primary" onclick="applyFilters()"><i class="fas fa-check"></i> تطبيق</button>
                        <button class="btn-secondary" onclick="resetFilters()"><i class="fas fa-redo"></i> إعادة</button>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="table-container">
                <div class="table-header">
                    <h3><i class="fas fa-users"></i> قائمة المسجلين</h3>
                    <span class="results-count" id="resultsCount"></span>
                </div>
                <div class="table-wrapper">
                    <table id="registrationsTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>الاسم</th>
                                <th>الفرنسية</th>
                                <th>الميلاد</th>
                                <th>المدينة</th>
                                <th>الخدمة</th>
                                <th>التسجيل</th>
                                <th>واتساب</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="9" style="text-align: center;">جاري تحميل البيانات...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Bottom Bar - أزرار التطبيق -->
        <div class="app-bottom-bar">
            <button class="bottom-btn" onclick="toggleTheme()">
                <i class="fas fa-moon"></i>
                <span>ليلي</span>
            </button>
            <button class="bottom-btn" onclick="exportToExcel()">
                <i class="fas fa-file-excel"></i>
                <span>تصدير</span>
            </button>
            <button class="bottom-btn" onclick="scrollToTop()">
                <i class="fas fa-arrow-up"></i>
                <span>أعلى</span>
            </button>
            <button class="bottom-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>خروج</span>
            </button>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✖</button>
            <div class="modal-header">
                <h2 id="modalName"></h2>
                <p id="modalNameFr"></p>
            </div>
            <div class="info-grid" id="modalContent"></div>
        </div>
    </div>

    <script>
        // منع أدوات المطور
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
        });

        let registrations = [];
        let currentData = [];

        // المديرين
        const admins = { "1280": "رضا السايح", "1997": "أيمن ممدوح" };
        let currentAdmin = "";

        // تحميل البيانات من ملف JSON
        async function loadData() {
            try {
                const response = await fetch('data.json');
                registrations = await response.json();
                currentData = [...registrations];
                if (document.getElementById('dashboard').classList.contains('active')) {
                    updateDashboard();
                }
            } catch (error) {
                console.error('خطأ في تحميل البيانات:', error);
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" style="text-align: center; color: #ef4444;">خطأ في تحميل البيانات</td></tr>';
            }
        }

        // تحديث لوحة التحكم
        function updateDashboard() {
            displayKPIs();
            displayStats();
            displayBirthdays();
            initFilters();
            displayTable(currentData);
        }

        // حساب العمر
        function calculateAge(birthDate) {
            const today = new Date();
            const birth = new Date(birthDate);
            let age = today.getFullYear() - birth.getFullYear();
            const monthDiff = today.getMonth() - birth.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) age--;
            return age;
        }

        // حساب الأيام حتى عيد الميلاد
        function daysUntilBirthday(birthDate) {
            const today = new Date();
            const birth = new Date(birthDate);
            const nextBirthday = new Date(today.getFullYear(), birth.getMonth(), birth.getDate());
            if (today > nextBirthday) nextBirthday.setFullYear(today.getFullYear() + 1);
            return Math.ceil((nextBirthday - today) / (1000 * 60 * 60 * 24));
        }

        // عرض مؤشرات KPI
        function displayKPIs() {
            if (!registrations.length) return;
            
            const total = registrations.length;
            const thisMonth = registrations.filter(r => new Date(r.regDate).getMonth() === new Date().getMonth()).length;
            const free = registrations.filter(r => r.service === "تسجيل مجاني").length;
            const cities = [...new Set(registrations.map(r => r.city))].length;

            document.getElementById('kpiGrid').innerHTML = `
                <div class="kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-icon"><i class="fas fa-users"></i></div>
                        <div class="kpi-value">${total}</div>
                    </div>
                    <div class="kpi-label">إجمالي المسجلين</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-icon"><i class="fas fa-calendar-check"></i></div>
                        <div class="kpi-value">${thisMonth}</div>
                    </div>
                    <div class="kpi-label">هذا الشهر</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-icon"><i class="fas fa-hand-holding-heart"></i></div>
                        <div class="kpi-value">${free}</div>
                    </div>
                    <div class="kpi-label">تسجيل مجاني</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-icon"><i class="fas fa-city"></i></div>
                        <div class="kpi-value">${cities}</div>
                    </div>
                    <div class="kpi-label">مدن مختلفة</div>
                </div>
            `;
        }

        // عرض المؤشرات الإضافية
        function displayStats() {
            if (!registrations.length) return;
            
            const ages = registrations.map(r => ({ 
                age: calculateAge(r.birthDate), 
                name: r.nameAr 
            }));
            
            const minAge = Math.min(...ages.map(a => a.age));
            const maxAge = Math.max(...ages.map(a => a.age));
            
            const youngest = ages.find(a => a.age === minAge);
            const oldest = ages.find(a => a.age === maxAge);
            const avgAge = (ages.reduce((a, b) => a + b.age, 0) / ages.length).toFixed(1);
            
            const serviceCounts = {
                'فوري': registrations.filter(r => r.service === 'تسجيل فوري').length,
                '6 أشهر': registrations.filter(r => r.service === 'اشتراك 6 أشهر').length,
                '12 شهر': registrations.filter(r => r.service === 'اشتراك 12 شهر').length,
                'مجاني': registrations.filter(r => r.service === 'تسجيل مجاني').length
            };
            const mostService = Object.entries(serviceCounts).sort((a, b) => b[1] - a[1])[0];

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-title"><i class="fas fa-child"></i> أصغر مسجل</div>
                    <div class="stat-main">
                        <span class="stat-number">${minAge}</span>
                        <span class="stat-name">${youngest.name}</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-title"><i class="fas fa-user-tie"></i> أكبر مسجل</div>
                    <div class="stat-main">
                        <span class="stat-number">${maxAge}</span>
                        <span class="stat-name">${oldest.name}</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-title"><i class="fas fa-calendar-alt"></i> معدل الأعمار</div>
                    <div class="stat-main">
                        <span class="stat-number">${avgAge}</span>
                        <span class="stat-name">سنة</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-title"><i class="fas fa-chart-pie"></i> الخدمة الأكثر</div>
                    <div class="stat-main">
                        <span class="stat-number">${mostService[0]}</span>
                        <span class="stat-name">${mostService[1]} مسجل</span>
                    </div>
                </div>
            `;
        }

        // عرض أعياد الميلاد
        function displayBirthdays() {
            if (!registrations.length) return;
            
            const upcoming = registrations
                .map(r => ({...r, days: daysUntilBirthday(r.birthDate)}))
                .filter(r => r.days <= 30)
                .sort((a, b) => a.days - b.days);

            const list = document.getElementById('birthdayList');
            
            if (upcoming.length === 0) {
                list.innerHTML = '<div class="birthday-item"><i class="fas fa-cake-candles"></i> لا توجد أعياد قريبة</div>';
                return;
            }

            list.innerHTML = upcoming.map(r => `
                <div class="birthday-item">
                    <i class="fas fa-cake-candles"></i>
                    <span>${r.nameAr}</span>
                    <span class="birthday-days">بعد ${r.days} يوم</span>
                </div>
            `).join('');
        }

        // تهيئة خيارات الفلتر
        function initFilters() {
            if (!registrations.length) return;
            
            const cities = [...new Set(registrations.map(r => r.city))].sort();
            const degrees = [...new Set(registrations.flatMap(r => r.degrees ? r.degrees.split(',').map(d => d.trim()) : []))].sort();
            
            const citySelect = document.getElementById('filterCity');
            const degreeSelect = document.getElementById('filterDegree');
            
            citySelect.innerHTML = '<option value="all">جميع المدن</option>';
            degreeSelect.innerHTML = '<option value="all">جميع الشهادات</option>';
            
            cities.forEach(city => {
                citySelect.innerHTML += `<option value="${city}">${city}</option>`;
            });
            
            degrees.forEach(degree => {
                degreeSelect.innerHTML += `<option value="${degree}">${degree}</option>`;
            });
        }

        // عرض الجدول
        function displayTable(data) {
            const tbody = document.getElementById('tableBody');
            document.getElementById('resultsCount').textContent = `عرض ${data.length} من ${registrations.length}`;
            
            tbody.innerHTML = data.map((r, i) => {
                let badgeClass = 'badge-warning';
                if (r.service === 'تسجيل مجاني') badgeClass = 'badge-success';
                else if (r.service === 'تسجيل فوري') badgeClass = 'badge-info';
                
                return `
                    <tr>
                        <td>${i+1}</td>
                        <td>${r.nameAr}</td>
                        <td>${r.nameFr}</td>
                        <td>${r.birthDate}</td>
                        <td>${r.city}</td>
                        <td><span class="badge ${badgeClass}">${r.service}</span></td>
                        <td>${r.regDate}</td>
                        <td>${r.whatsapp}</td>
                        <td><button class="btn-details" onclick='showDetails(${JSON.stringify(r).replace(/'/g, "\\'")})'><i class="fas fa-eye"></i></button></td>
                    </tr>
                `;
            }).join('');
        }

        // تطبيق الفلاتر
        function applyFilters() {
            const service = document.getElementById('filterService').value;
            const city = document.getElementById('filterCity').value;
            const degree = document.getElementById('filterDegree').value;
            const name = document.getElementById('filterName').value.toLowerCase();

            currentData = registrations.filter(r => {
                if (service !== 'all' && r.service !== service) return false;
                if (city !== 'all' && r.city !== city) return false;
                if (degree !== 'all') {
                    const degrees = r.degrees ? r.degrees.split(',').map(d => d.trim()) : [];
                    if (!degrees.includes(degree)) return false;
                }
                if (name && !r.nameAr.includes(name) && !r.nameFr.toLowerCase().includes(name)) return false;
                return true;
            });

            displayTable(currentData);
        }

        function resetFilters() {
            document.getElementById('filterService').value = 'all';
            document.getElementById('filterCity').value = 'all';
            document.getElementById('filterDegree').value = 'all';
            document.getElementById('filterName').value = '';
            currentData = [...registrations];
            displayTable(currentData);
        }

        // تصدير إلى Excel
        function exportToExcel() {
            let csv = "الاسم بالعربية,الاسم بالفرنسية,تاريخ الميلاد,المدينة,الخدمة,تاريخ التسجيل,الواتساب,البريد الإلكتروني,الشهادات\n";
            
            currentData.forEach(r => {
                csv += `"${r.nameAr}","${r.nameFr}","${r.birthDate}","${r.city}","${r.service}","${r.regDate}","${r.whatsapp}","${r.email}","${r.degrees}"\n`;
            });
            
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'المسجلين.csv';
            link.click();
        }

        function scrollToTop() {
            document.querySelector('.main-content').scrollTo({ top: 0, behavior: 'smooth' });
        }

        // عرض التفاصيل
        function showDetails(p) {
            document.getElementById('modalName').textContent = p.nameAr;
            document.getElementById('modalNameFr').textContent = p.nameFr;
            
            const degrees = p.degrees ? p.degrees.split(',').map(d => d.trim()).join('، ') : 'غير محدد';
            
            document.getElementById('modalContent').innerHTML = `
                <div class="info-item">
                    <div class="info-label">رقم البطاقة</div>
                    <div class="info-value">${p.cin}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">مكان الإزدياد</div>
                    <div class="info-value">${p.birthPlace}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">العنوان</div>
                    <div class="info-value">${p.address}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">البريد الإلكتروني</div>
                    <div class="info-value">${p.email}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">الشهادات</div>
                    <div class="info-value">${degrees}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">المدرسة/الجامعة</div>
                    <div class="info-value">${p.school}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">العمر</div>
                    <div class="info-value">${calculateAge(p.birthDate)} سنة</div>
                </div>
                <div class="info-item">
                    <div class="info-label">الخدمة</div>
                    <div class="info-value">${p.service}</div>
                </div>
            `;
            
            document.getElementById('detailsModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailsModal').classList.remove('active');
        }

        function updateDate() {
            const today = new Date();
            // تاريخ مختصر: 15/03/26
            const day = String(today.getDate()).padStart(2, '0');
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const year = String(today.getFullYear()).slice(-2);
            document.getElementById('currentDate').textContent = `${day}/${month}/${year}`;
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.querySelector('.bottom-btn:first-child i');
            const text = document.querySelector('.bottom-btn:first-child span');
            if (document.body.classList.contains('dark-mode')) {
                btn.className = 'fas fa-sun';
                text.textContent = 'نهاري';
            } else {
                btn.className = 'fas fa-moon';
                text.textContent = 'ليلي';
            }
        }

        function checkPassword() {
            const code = document.getElementById('passwordInput').value;
            
            if (admins[code]) {
                currentAdmin = admins[code];
                document.getElementById('adminName').textContent = currentAdmin;
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').classList.add('active');
                
                loadData();
                updateDate();
                
                setInterval(updateDate, 60000);
            } else {
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        function logout() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('passwordInput').value = '';
            document.getElementById('errorMessage').style.display = 'none';
        }

        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
</body>
</html>
